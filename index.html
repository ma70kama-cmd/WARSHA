<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سجل بيانات العملاء</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; margin: 20px; text-align: center; }
        h2 { color: #333; }
        table { width: 90%; margin: 20px auto; border-collapse: collapse; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: center; }
        th { background-color: #4CAF50; color: white; }
        tr:nth-child(even) { background-color: #f2f2f2; }
        .loading { color: blue; font-weight: bold; }
    </style>
</head>
<body>

    <h2>قائمة العملاء المسجلين من الواتساب</h2>
    
    <div id="status" class="loading">جاري تحميل البيانات...</div>
    
    <table id="customerTable" style="display:none;">
        <thead>
            <tr>
                <th>التاريخ</th>
                <th>اسم العميل</th>
                <th>رقم الهاتف</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <script>
        // ضع هنا رابط الـ Web App الخاص بك الذي ينتهي بـ /exec
        const scriptUrl = 'https://script.google.com/macros/s/AKfycbxLWSkhpLl7Vr91RGH3O4WTxH7hBXM24V3SDhBfiDLWaF4zno575sss5iZ9ZQyDACCg/exec';

        async function fetchData() {
            try {
                const response = await fetch(scriptUrl);
                const data = await response.json();
                
                const tableBody = document.getElementById('tableBody');
                const status = document.getElementById('status');
                const table = document.getElementById('customerTable');

                if (data.length === 0) {
                    status.innerText = "لا توجد بيانات مسجلة بعد.";
                    return;
                }

                data.forEach(customer => {
                    const row = `<tr>
                        <td>${new Date(customer.date).toLocaleString('ar-EG')}</td>
                        <td>${customer.name}</td>
                        <td>${customer.phone}</td>
                    </tr>`;
                    tableBody.innerHTML += row;
                });

                status.style.display = 'none';
                table.style.display = 'table';
            } catch (error) {
                document.getElementById('status').innerText = "حدث خطأ أثناء تحميل البيانات.";
                console.error(error);
            }
        }

        fetchData();
    </script>
</body>
</html>
