<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل العملاء</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f4f4f4; }
        .box { background: white; padding: 20px; border-radius: 10px; display: inline-block; width: 300px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        input { width: 90%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; }
        button { background: #25d366; color: white; border: none; padding: 10px 20px; cursor: pointer; width: 100%; }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 8px; }
    </style>
</head>
<body>
    <div class="box">
        <h3>سجل بياناتك</h3>
        <input type="text" id="n" placeholder="الاسم">
        <input type="text" id="p" placeholder="الرقم">
        <button onclick="send()">إرسال</button>
        <p id="msg"></p>
        <hr>
        <h4>العملاء المسجلون</h4>
        <table id="tab"></table>
    </div>

    <script>
        // *** ضع رابط الجوجل شيت الخاص بك هنا ***
        const url = 'https://script.google.com/macros/s/AKfycbybDNuRJ4_He0ZND1e4Au3XkO3gkfA8PBoQBaSv3CvYueBjDCDmIexy5XWsYYdAS4dvTA/exec';

        function send() {
            const data = { name: document.getElementById('n').value, phone: document.getElementById('p').value };
            fetch(url, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
            document.getElementById('msg').innerText = "تم الإرسال! حدث الصفحة لرؤية اسمك.";
        }

        async function show() {
            const res = await fetch(url);
            const data = await res.json();
            let html = '<tr><th>الاسم</th><th>الرقم</th></tr>';
            data.reverse().forEach(x => html += `<tr><td>${x.name}</td><td>${x.phone}</td></tr>`);
            document.getElementById('tab').innerHTML = html;
        }
        show();
    </script>
</body>
</html>
